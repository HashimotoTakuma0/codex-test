name: Build Windows App

on:
  workflow_dispatch:
  push:
    paths:
      - "ReversiDesktop/**"
  pull_request:
    paths:
      - "ReversiDesktop/**"

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ReversiDesktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ReversiDesktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ReversiDesktop/src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri:build

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: reversi-desktop-windows
          path: |
            ReversiDesktop/src-tauri/target/release/bundle/nsis/*.exe
            ReversiDesktop/src-tauri/target/release/bundle/msi/*.msi
